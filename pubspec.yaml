name: voicetask
description: "VoiceTask — A personal voice-driven task manager"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Voice & AI
  record: ^6.2.0
  path_provider: ^2.1.2
  http: ^1.2.0

  # UI & Charts
  fl_chart: ^0.66.2

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Home Widget
  home_widget: ^0.7.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.1
  google_fonts: ^6.2.1
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  hive_generator: ^2.0.1
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
